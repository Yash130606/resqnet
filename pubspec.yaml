name: resqnetpro
description: "ResQNet Pro - Smart Disaster Coordination Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  go_router: ^13.2.0
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.6  
  cloud_firestore: ^4.17.5
  firebase_messaging: ^14.7.10
  geolocator: ^12.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  uuid: ^4.4.0
  intl: ^0.19.0
  geocoding: ^4.0.0
  lottie: ^3.1.0
  url_launcher: ^6.2.5
  http: ^1.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# 🔥 Launcher Icon Configuration (MUST be outside dev_dependencies)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/disaster_bg.png
